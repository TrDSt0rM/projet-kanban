version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongo-kanban
    restart: always
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_DATABASE=kanban_mongo
    volumes:
      - mongo_data:/data/db
      - attachments_data:/data/uploads

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-visualizer
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      - mongodb

volumes:
  mongo_data:
  attachments_data: